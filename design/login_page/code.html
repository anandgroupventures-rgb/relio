                      "error": "#ba1a1a",

    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="min-h-screen flex flex-col justify-between selection:bg-secondary-fixed">
<div class="flex-grow flex flex-col items-center justify-center px-container-margin py-section-gap">
<div class="w-full max-w-md">
<!-- Brand Section -->
<div class="text-center mb-section-gap">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-xl mb-4 shadow-xl shadow-primary/10">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="real_estate_agent">real_estate_agent</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-tight">Relio</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Empowering real estate agents with smart leads.</p>
</div>
<!-- Login Card -->
<div class="glass-card border border-outline-variant rounded-xl p-card-padding shadow-[0px_4px_20px_rgba(26,35,126,0.05)] transition-all duration-300">
<form class="space-y-6" id="loginForm">
<div>
<label class="font-label-md text-label-md text-on-surface-variant mb-2 block" for="phone">PHONE NUMBER</label>
<div class="relative flex items-center input-glow transition-all rounded-lg border border-outline-variant bg-surface">
<span class="pl-4 pr-2 font-body-lg text-body-lg text-on-surface border-r border-outline-variant">+91</span>
<input class="w-full py-3 px-4 bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder:text-outline" id="phone" maxlength="10" name="phone" placeholder="Enter your 10 digit number" required="" type="tel"/>
</div>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-headline-md text-headline-md rounded-lg shadow-lg active:scale-[0.98] transition-all hover:opacity-90" type="submit">
                        Send OTP
                    </button>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-md text-label-md text-outline uppercase">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full flex items-center justify-center gap-3 py-3 border border-outline-variant bg-surface rounded-lg font-body-lg text-body-lg text-on-surface hover:bg-surface-container-low active:scale-[0.98] transition-all" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                        Login with Google
                    </button>
</form>
</div>
<div class="text-center mt-gutter">
<a class="inline-flex items-center gap-1 font-body-md text-body-md text-primary font-semibold hover:underline group" href="#">
                    Continue without login
                    <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</a>
</div>
</div>
</div>
<!-- Background Illustration - Tactile / Modern Abstract -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-30">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary-fixed rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -left-24 w-64 h-64 bg-secondary-fixed rounded-full blur-3xl"></div>
</div>
<!-- Footer Links -->
<footer class="w-full px-container-margin pb-8 pt-4">
<div class="flex flex-col md:flex-row items-center justify-center gap-4 text-center">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
<span class="hidden md:block w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="hidden md:block w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
<div class="mt-4 text-center">
<p class="font-label-md text-[10px] text-outline uppercase tracking-widest">© 2024 Relio CRM. All Rights Reserved.</p>
</div>
</footer>
<script>
        // Simple Interaction Logic
        const phoneInput = document.getElementById('phone');
        const loginForm = document.getElementById('loginForm');

        // Restrict to numbers only
        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Form Submit Feedback
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            // Visual feedback
            btn.disabled = true;
            btn.innerHTML = `
                <div class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Sending...
                </div>
            `;

            // Reset after 2 seconds for demo purposes
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = originalText;
                alert('OTP sent to ' + phoneInput.value);
            }, 2000);
        });

        // Add some ambient movement to background glows
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const glows = document.querySelectorAll('.blur-3xl');
            glows.forEach((glow, index) => {
                const speed = (index + 1) * 20;
                glow.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body></html>
