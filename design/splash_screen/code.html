<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .splash-bg {
            background: radial-gradient(circle at center, #FFFFFF 0%, #F8F9FF 70%, #E0E4FF 100%);
        }

        @keyframes logo-reveal {
            0% { transform: scale(0.9); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0px); }
        }

        @keyframes tagline-reveal {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-logo {
            animation: logo-reveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .animate-tagline {
            animation: tagline-reveal 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
            opacity: 0;
        }

        .loading-dot {
            animation: dot-pulse 1.5s infinite ease-in-out;
        }

        @keyframes dot-pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md overflow-hidden splash-bg min-h-screen flex flex-col items-center justify-center">
<!-- Subtle Background Element -->
<div class="absolute inset-0 z-0 opacity-20 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-secondary-container blur-[120px] rounded-full"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center text-center px-container-margin">
<!-- Logo Branding -->
<div class="animate-logo mb-6">
<div class="w-24 h-24 mb-6 mx-auto bg-primary rounded-2xl flex items-center justify-center shadow-[0px_8px_32px_rgba(26,35,126,0.15)] overflow-hidden relative group">
<!-- Abstract Logo Shape -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary to-on-primary-container opacity-50"></div>
<span class="material-symbols-outlined text-on-primary text-6xl relative z-10" style="font-variation-settings: 'FILL' 1;">
                    domain
                </span>
<!-- Subtle Shine Effect -->
<div class="absolute -inset-full h-full w-1/2 z-20 block transform -skew-x-12 bg-gradient-to-r from-transparent to-white opacity-20 group-hover:animate-shine"></div>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg tracking-tight text-primary">
                Relio
            </h1>
</div>
<!-- Tagline -->
<div class="animate-tagline mb-section-gap">
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs md:max-w-md mx-auto">
                Real Estate Lead Management
            </p>
</div>
<!-- Progress/Loading State -->
<div class="fixed bottom-16 left-0 right-0 flex flex-col items-center gap-4 animate-tagline" style="animation-delay: 1s;">
<div class="flex items-center gap-2">
<div class="loading-dot w-2 h-2 rounded-full bg-primary"></div>
<div class="loading-dot w-2 h-2 rounded-full bg-primary" style="animation-delay: 0.2s;"></div>
<div class="loading-dot w-2 h-2 rounded-full bg-primary" style="animation-delay: 0.4s;"></div>
</div>
<span class="font-label-md text-label-md text-outline tracking-widest uppercase">
                Initializing System
            </span>
</div>
</main>
<!-- Visual Polish: Content Cards Preview (Abstracted) -->
<div class="absolute inset-x-0 bottom-0 z-0 h-1/4 opacity-10 flex justify-center gap-gutter overflow-hidden pointer-events-none">
<div class="w-64 h-80 bg-surface-container-highest rounded-t-xl border border-outline-variant transform translate-y-12 shadow-sm"></div>
<div class="w-64 h-80 bg-surface-container-highest rounded-t-xl border border-outline-variant transform translate-y-8 shadow-md"></div>
<div class="w-64 h-80 bg-surface-container-highest rounded-t-xl border border-outline-variant transform translate-y-16 shadow-sm"></div>
</div>
<script>
        // Simple logic to simulate loading transition or visual interest
        document.addEventListener('DOMContentLoaded', () => {
            // Optional: simulate an automatic redirect after few seconds
            // setTimeout(() => {
            //    window.location.href = 'dashboard.html';
            // }, 3500);
            
            // Interaction: Mouse movement parallax effect
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
                const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
                const logo = document.querySelector('.animate-logo');
                if (logo) {
                    logo.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        });
    </script>
</body></html>
