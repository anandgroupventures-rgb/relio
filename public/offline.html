<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Offline - Relio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #F7F3ED;
      color: #1A1612;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    
    .container {
      max-width: 400px;
      text-align: center;
    }
    
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      color: #1A1612;
    }
    
    p {
      font-size: 16px;
      color: #6B5F53;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    
    .info {
      background: #FBF3DC;
      border: 1px solid #E8C96A;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    
    .info p {
      margin: 0;
      font-size: 14px;
      color: #6B5F53;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #C49A2A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    
    .btn:hover {
      background: #B08820;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .secondary {
      background: transparent;
      color: #6B5F53;
      border: 1.5px solid #E8DDD0;
      margin-top: 12px;
    }
    
    .secondary:hover {
      background: #F0EBE3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Don't worry! Relio works offline. Your leads and changes are safely stored on your device.</p>
    
    <div class="info">
      <p>✓ You can view all your leads<br>
         ✓ Add and edit leads<br>
         ✓ Changes will sync when you're back online</p>
    </div>
    
    <a href="/today" class="btn">Continue Working</a>
    <br>
    <button onclick="window.location.reload()" class="btn secondary">Try Reloading</button>
  </div>
  
  <script>
    // Check if we came back online
    window.addEventListener('online', function() {
      window.location.href = '/today';
    });
  </script>
</body>
</html>
